name: ARGUS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  # ── Lint & Type Check ──
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build shared types
        run: npm run build -w @argus/shared

      - name: Type-check backend
        run: npx tsc --noEmit
        working-directory: packages/backend

      - name: Type-check frontend
        run: npx tsc --noEmit
        working-directory: packages/frontend

  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build shared
        run: npm run build -w @argus/shared

      - name: Build backend
        run: npm run build -w @argus/backend

      - name: Build frontend
        run: npm run build -w @argus/frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/
          retention-days: 7

  # ── Docker Build (on main only) ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t argus:latest .

      - name: Test container health
        run: |
          docker run -d --name argus-test -p 3001:3001 argus:latest
          sleep 10
          curl -f http://localhost:3001/api/health || exit 1
          docker stop argus-test
          docker rm argus-test
