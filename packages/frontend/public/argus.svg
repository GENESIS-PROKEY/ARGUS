<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1726"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shield body -->
  <path d="M256 32 L460 120 L460 260 Q460 400 256 488 Q52 400 52 260 L52 120 Z" fill="url(#shieldGrad)" stroke="url(#glowGrad)" stroke-width="4"/>
  <!-- Inner shield -->
  <path d="M256 56 L440 136 L440 256 Q440 384 256 464 Q72 384 72 256 L72 136 Z" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <!-- Eye glow -->
  <circle cx="256" cy="240" r="80" fill="url(#eyeGlow)"/>
  <!-- Eye outer -->
  <ellipse cx="256" cy="240" rx="80" ry="55" fill="none" stroke="#00d4ff" stroke-width="3" filter="url(#glow)"/>
  <!-- Iris -->
  <circle cx="256" cy="240" r="28" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <!-- Pupil -->
  <circle cx="256" cy="240" r="12" fill="#0a0e1a"/>
  <!-- Light reflection -->
  <circle cx="246" cy="232" r="5" fill="white" opacity="0.6"/>
  <!-- ARGUS text -->
  <text x="256" y="370" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="8">ARGUS</text>
  <!-- Tagline -->
  <text x="256" y="405" text-anchor="middle" font-family="'Inter',sans-serif" font-size="14" fill="#00d4ff" opacity="0.7" letter-spacing="3">NOTHING ESCAPES ARGUS</text>
</svg>
